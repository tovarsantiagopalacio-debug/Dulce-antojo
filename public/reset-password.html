<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nueva contraseña — Dulce Antojo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="text-gray-200 min-h-screen flex items-center justify-center" style="background-color: #0A0A0A;">
    <div class="aurora-background"></div>
    <div class="w-full max-w-md px-4">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold font-heading text-white">Dulce Antojo</h1>
        <p class="text-gray-400 mt-2">Crea una nueva contraseña</p>
      </div>
      <div class="bg-gray-900/60 border border-gray-800 rounded-2xl p-8">
        <form id="reset-form" class="space-y-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Nueva contraseña</label>
            <input id="input-password" type="password" required minlength="8" autocomplete="new-password"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500"
              placeholder="Mínimo 8 caracteres" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Confirmar contraseña</label>
            <input id="input-confirm" type="password" required autocomplete="new-password"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-500" />
          </div>
          <div id="form-msg" class="hidden text-sm rounded-lg px-4 py-3"></div>
          <button type="submit"
            class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 rounded-full transition">
            Guardar contraseña
          </button>
        </form>
        <div class="text-center mt-6">
          <a href="/" class="text-sm text-gray-500 hover:text-emerald-400 transition">← Volver al inicio</a>
        </div>
      </div>
    </div>
    <script src="/reset-password.js"></script>
  </body>
</html>
