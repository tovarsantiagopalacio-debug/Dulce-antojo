<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Pedidos — Dulce Antojo</title>
    <link rel="stylesheet" href="/tailwind.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="text-gray-200 min-h-screen" style="background-color: #0A0A0A;">
    <div class="aurora-background"></div>

    <!-- HEADER -->
    <header class="bg-black/70 backdrop-blur-lg border-b border-gray-800 sticky top-0 z-40">
      <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="flex items-center space-x-3">
          <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15.546c-.523 0-1.046.151-1.5.454a2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0c-.454-.303-.977-.454-1.5-.454V5.546c.523 0 1.046-.151 1.5-.454a2.704 2.704 0 013 0 2.704 2.704 0 003 0 2.704 2.704 0 013 0 2.704 2.704 0 003 0c.454.303.977.454 1.5.454v10z"></path>
          </svg>
          <h1 class="text-2xl font-bold text-white tracking-wide font-heading">Dulce Antojo</h1>
        </a>
        <div class="flex items-center space-x-4">
          <span id="welcome-message" class="text-gray-300 text-sm hidden lg:block"></span>
          <a href="/" class="text-gray-300 hover:text-emerald-400 transition font-medium text-sm">← Volver al catálogo</a>
          <button id="logout-btn" class="text-gray-300 hover:text-red-400 transition" title="Cerrar Sesión">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container mx-auto px-4 py-12 max-w-4xl">
      <div class="mb-10">
        <h2 class="text-4xl font-bold font-heading text-white">Mis Pedidos</h2>
        <p class="text-gray-400 mt-2">Historial completo de tus pedidos realizados.</p>
      </div>

      <!-- Estado de carga -->
      <div id="loading-message" class="text-center text-gray-400 py-20">
        <svg class="animate-spin w-10 h-10 text-emerald-400 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        Cargando tus pedidos...
      </div>

      <!-- Lista de pedidos -->
      <div id="orders-list" class="space-y-6"></div>
    </main>

    <script src="my-orders.js"></script>
  </body>
</html>
